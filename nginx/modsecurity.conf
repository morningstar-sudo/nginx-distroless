# ModSecurity engine config. Loaded only when IS_MS_ON=true selects nginx-ms.conf.
SecRuleEngine On

SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

SecResponseBodyAccess Off

SecTmpDir /tmp
SecDataDir /tmp

SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /dev/stderr

SecArgumentSeparator &
SecCookieFormat 0
SecUnicodeMapFile /etc/nginx/unicode.mapping 20127

# OWASP Core Rule Set
Include /etc/nginx/crs/crs-setup.conf
Include /etc/nginx/crs/rules/*.conf

# Extension point: downstream custom rules / exclusions (evaluated after CRS).
Include /etc/nginx/modsecurity.d/*.conf
