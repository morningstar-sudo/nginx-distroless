# Shared http-level config, included by both nginx.conf and nginx-ms.conf.
include /etc/nginx/mime.types;
default_type application/octet-stream;

access_log /dev/stdout;

sendfile on;
tcp_nopush on;
keepalive_timeout 65;

# All writable paths live under /tmp (read-only rootfs friendly).
client_body_temp_path /tmp/client_temp;
proxy_temp_path /tmp/proxy_temp;

gzip on;
gzip_vary on;
gzip_types text/plain text/css application/json application/javascript
           application/xml image/svg+xml;

server_tokens off;
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;

# Extension point: downstream images COPY their server blocks / overrides here.
include /etc/nginx/conf.d/*.conf;
